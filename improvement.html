<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LinkedIn AI Profiler Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>AI Profiler Settings</h2>
    <p>Enter your Google Gemini API Key below to enable AI profile analysis.</p>
    <div class="input-group">
      <label for="apiKey">Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="AIzaSy...">
    </div>
    <button id="saveBtn">Save Key</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
